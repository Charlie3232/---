<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備研發部 - 問題解決分析庫</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="pixel-bg">
  <div class="watermark">GENIIDEAS</div>

  <div id="login-overlay">
    <div class="pixel-box login-card">
      <div class="pixel-title">SECURITY_ACCESS</div>
      <p class="pixel-text">問題解決分析庫 - 請輸入人員帳密</p>
      <input type="text" id="login-user" class="pixel-input" placeholder="USER ID...">
      <input type="password" id="login-pwd" class="pixel-input" placeholder="PASSWORD..." style="margin-top:10px;">
      <button class="pixel-btn btn-primary" onclick="handleLogin()" style="margin-top:20px; width:100%;">驗證啟動</button>
    </div>
  </div>

  <div id="main-ui" style="display:none;">
    <header>
      <h1 class="pixel-h1">設備研發部 - 問題解決分析庫</h1>
      <div class="user-display">USER: <span id="current-username-display">UNKNOWN</span></div>
    </header>

    <div class="layout-container">
      <nav class="sidebar pixel-border">
        <button class="nav-btn" id="btn-tab-main" onclick="switchTab('tab-main')" style="display:none;">儀表板<br><small>(Dashboard)</small></button>
        <button class="nav-btn active" id="btn-tab-issues" onclick="switchTab('tab-issues')">問題資料庫<br><small>(Issues)</small></button>
        <button class="nav-btn" id="btn-tab-manager" onclick="switchTab('tab-manager')" style="display:none; color: #ff0055;">主管事務</button>
        <div style="flex:1"></div>
        <button class="nav-btn logout-btn" onclick="location.reload()">登出</button>
      </nav>

      <main class="main-content">
        <div id="tab-main" class="tab-section" style="display:none;">
          <div class="stats-container pixel-border">
            <div class="stats-header-wrap">
              <h2 class="pixel-h1" style="font-size:18px; color: var(--pixel-green);">任務統計分析</h2>
              <div class="stats-controls">
                <div class="date-range-picker">
                  <input type="date" id="stats-date-start" class="pixel-input" onchange="renderStats()">
                  <span>~</span>
                  <input type="date" id="stats-date-end" class="pixel-input" onchange="renderStats()">
                </div>
                <div class="custom-select">
                  <div id="stats-product-text" class="select-selected pixel-input" onclick="toggleDropdown('stats-product', event)">產品篩選 ▾</div>
                  <div class="select-items pixel-border" id="stats-product" style="display:none;"></div>
                </div>
              </div>
            </div>
            <div id="stats-bars"></div>
          </div>
        </div>

        <div id="tab-issues" class="tab-section">
          <div class="control-panel pixel-border">
            <input type="text" id="search-input" class="pixel-input mini-search" placeholder="關鍵字..." oninput="renderIssues()">
            <div class="filter-group">
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-owner', event)">負責人 ▾</div><div class="select-items pixel-border" id="items-owner" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-product', event)">產品別 ▾</div><div class="select-items pixel-border" id="items-product" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-project', event)">專案別 ▾</div><div class="select-items pixel-border" id="items-project" style="display:none;"></div></div>
            </div>
            <button class="pixel-btn btn-add" onclick="openModal('TS')">+ 新增</button>
          </div>
          <div class="todo-grid" id="issue-display"></div>
        </div>

        <div id="tab-manager" class="tab-section" style="display:none;">
            <div class="control-panel pixel-border" style="border-color: #ff0055;">
              <input type="text" id="search-input-mgr" class="pixel-input" placeholder="搜尋主管事務..." oninput="renderManagerIssues()">
              <button class="pixel-btn btn-add" style="background:#ff0055; border-color:#ff0055;" onclick="openModal('MGR')">+ 新增</button>
            </div>
            <div class="todo-grid" id="manager-issue-display"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="pixel-modal">
      <div class="modal-header-bar"><span id="modal-title">EDIT_RECORD</span><span class="pixel-close" onclick="closeModal()">[X]</span></div>
      <form id="issueForm" class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="field-grid">
          <div class="field-item"><label class="pixel-label">問題名稱</label><input type="text" id="input-issue" class="pixel-input" required></div>
          <div class="field-item"><label class="pixel-label">建立者</label><input type="text" id="input-creator" class="pixel-input" readonly></div>
        </div>
        <div class="field-grid-4">
          <div class="field-item"><label class="pixel-label">Owner</label><select id="input-owner" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">Status</label><select id="input-status" class="pixel-input" onchange="handleStatusChange()" required></select></div>
          <div class="field-item"><label class="pixel-label">客戶別</label><select id="input-customer" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">產品別</label><select id="input-product" class="pixel-input" required></select></div>
        </div>
        <div class="field-grid">
          <div class="field-item"><label class="pixel-label">專案別</label><select id="input-project" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label">預計完成日</label><input type="date" id="input-deadline" class="pixel-input" required></div>
        </div>
        <div class="field-item"><label class="pixel-label">問題描述</label><textarea id="input-description" class="pixel-input scroll" rows="2"></textarea></div>
        
        <div class="field-item">
          <label class="pixel-label">項目紀錄 <button type="button" class="mini-plus-btn" onclick="addRecordItem()">[+] 新增條目</button></label>
          <div id="records-container" class="scroll" style="max-height: 200px; overflow-y: auto; padding: 10px; border: 2px dashed #285428;">
            </div>
        </div>

        <div class="modal-footer" style="display:flex; justify-content: space-between;">
          <button type="button" id="btn-delete" class="pixel-btn" style="background:#ff0055; display:none;" onclick="deleteIssue()">[ 刪除紀錄 ]</button>
          <div style="display:flex; gap:10px; margin-left:auto;">
            <button type="button" class="pixel-btn" onclick="closeModal()">取消</button>
            <button type="button" id="submit-btn" class="pixel-btn btn-primary" onclick="submitIssue()">建立完成</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
