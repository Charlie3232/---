<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備研發部 - 問題解決分析庫</title>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="kawaii-bg">

  <div id="login-overlay">
    <div class="cute-card">
      <div class="cute-tag">STAFF ONLY</div>
      <h2 style="color: #6d4c41;">問題解決分析庫</h2>
      <p style="font-size: 14px; color: #8d6e63;">。* 認證身分以啟動同步 *。</p>
      <div class="login-inputs">
        <input type="text" id="login-user" class="cute-input" placeholder="人員識別碼 (ID)">
        <input type="password" id="login-pwd" class="cute-input" placeholder="密碼 (Password)">
      </div>
      <button class="cute-btn btn-main" onclick="handleLogin()">身分驗證 ➔</button>
    </div>
  </div>

  <div id="main-ui" style="display:none;">
    <header class="kawaii-header">
      <div class="header-left">
        <span class="user-badge">✿ <span id="current-username">使用者</span></span>
      </div>
      <h1 class="main-title">設備研發部 - 問題解決分析庫</h1>
      <button class="logout-link" onclick="location.reload()">登出系統</button>
    </header>

    <div class="layout-container">
      <nav class="sidebar">
        <button class="nav-btn" id="btn-tab-main" onclick="switchTab('tab-main')" style="display:none;">核心儀表板</button>
        <button class="nav-btn active" id="btn-tab-issues" onclick="switchTab('tab-issues')">問題資料庫</button>
        <button class="nav-btn" id="btn-tab-manager" onclick="switchTab('tab-manager')" style="display:none; background: #ffebee; color: #d32f2f;">主管特權</button>
      </nav>

      <main class="main-content">
        <div id="tab-main" class="tab-section" style="display:none;">
          <div class="content-box">
            <h2 class="box-title">數據統計看板</h2>
            <div id="stats-bars"></div>
          </div>
        </div>

        <div id="tab-issues" class="tab-section">
          <div class="control-panel">
            <input type="text" id="search-input" class="cute-input" placeholder="搜尋關鍵字..." oninput="renderIssues()">
            <div class="filter-group">
                <div class="custom-select"><div class="select-selected cute-input" onclick="toggleDropdown('items-owner', event)">負責人 ▾</div><div class="select-items" id="items-owner" style="display:none;"></div></div>
                <div class="custom-select"><div class="select-selected cute-input" onclick="toggleDropdown('items-status', event)">狀態 ▾</div><div class="select-items" id="items-status" style="display:none;"></div></div>
            </div>
            <button class="cute-btn btn-add" onclick="openModal('TS')">+ 新增任務</button>
          </div>
          <div class="todo-grid" id="issue-display"></div>
        </div>

        <div id="tab-manager" class="tab-section" style="display:none;">
          <div class="control-panel" style="background: #fff5f5;">
            <input type="text" id="search-input-mgr" class="cute-input" placeholder="搜尋主管事務...">
            <button class="cute-btn btn-mgr" onclick="openModal('MGR')">+ 新增事務</button>
          </div>
          <div id="manager-issue-display" class="todo-grid"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="cute-modal">
      <div class="modal-header">
        <span id="modal-title">資料編輯</span>
        <span class="close-btn" onclick="closeModal()">✕</span>
      </div>
      <form id="issueForm" class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="field-grid">
          <div><label class="cute-label">問題名稱</label><input type="text" id="input-issue" class="cute-input" required></div>
          <div><label class="cute-label">登錄者</label><input type="text" id="input-creator" class="cute-input" readonly></div>
        </div>
        <div class="field-grid-4">
          <div><label class="cute-label">負責人</label><select id="input-owner" class="cute-input" required></select></div>
          <div><label class="cute-label">狀態</label><select id="input-status" class="cute-input" required></select></div>
          <div><label class="cute-label">客戶</label><select id="input-customer" class="cute-input" required></select></div>
          <div><label class="cute-label">產品</label><select id="input-product" class="cute-input" required></select></div>
        </div>
        <div class="field-grid">
          <div><label class="cute-label">專案別</label><select id="input-project" class="cute-input" required></select></div>
          <div><label class="cute-label">預計日期</label><input type="date" id="input-deadline" class="cute-input" required></div>
        </div>
        <div><label class="cute-label">細節</label><textarea id="input-description" class="cute-input" rows="4"></textarea></div>
        <div><label class="cute-label">紀錄</label><textarea id="input-records" class="cute-input" rows="4"></textarea></div>
        
        <div class="modal-footer">
          <button type="button" id="btn-delete" class="cute-btn btn-del" onclick="deleteIssue()">刪除</button>
          <div style="margin-left:auto; display:flex; gap:10px;">
            <button type="button" class="cute-btn" onclick="closeModal()">取消</button>
            <button type="button" id="submit-btn" class="cute-btn btn-main" onclick="submitIssue()">儲存送出</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
